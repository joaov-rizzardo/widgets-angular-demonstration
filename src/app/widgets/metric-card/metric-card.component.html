<div class="metric" [ngClass]="colorClass()">
  <div class="metric__accent"></div>

  <div class="metric__body">
    <span class="metric__label">{{ cfg().label }}</span>

    <div class="metric__value-row">
      <span class="metric__value">{{ cfg().value | number:'1.0-0' }}</span>
      @if (cfg().unit) {
        <span class="metric__unit">{{ cfg().unit }}</span>
      }
    </div>

    @if (cfg().trend) {
      <div class="metric__trend"
           [class.metric__trend--up]="trendPositive()"
           [class.metric__trend--down]="trendNegative()">
        <span class="material-icons">
          {{ trendPositive() ? 'trending_up' : trendNegative() ? 'trending_down' : 'trending_flat' }}
        </span>
        {{ cfg().trend }}
      </div>
    }
  </div>
</div>
